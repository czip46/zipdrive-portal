function getCoords(str) {
  const s = str.toLowerCase();
  for (const [key, coords] of Object.entries(LOCATIONS)) {
    if (s.includes(key)) return coords;
  }
  return { lat:39.961, lng:-82.999 }; // Default: Columbus downtown
}

function haversine(c1, c2) {
  const R = 3958.8; // Earth radius in miles
  const dLat = (c2.lat - c1.lat) * Math.PI / 180;
  const dLng = (c2.lng - c1.lng) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(c1.lat*Math.PI/180) * Math.cos(c2.lat*Math.PI/180) * Math.sin(dLng/2)**2;
  return Math.round(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

const c1 = getCoords(pickup);
const c2 = getCoords(dest);
const straight = haversine(c1, c2);
// Add ~15% for road routing vs straight line, minimum 2 miles
return Math.max(2, Math.round(straight * 1.15));

address:          useRef(), website:     useRef(), defaultRate:     useRef(),
deadHeadFee:      useRef(), rateFleetRepo:useRef(),rateConsumer:    useRef(),
rateOilChange:    useRef(), rateAuction: useRef(), rateOnProperty:  useRef(),
insuranceCarrier: useRef(), broker:      useRef(), radiusLimit:     useRef(),
};

function save() {
const updated = { …settings, …toggles };
Object.keys(r).forEach(k => {
if (r[k].current) {
const v = r[k].current.value;
updated[k] = [“defaultRate”,“deadHeadFee”,“rateFleetRepo”,“rateConsumer”,“rateOilChange”,“rateAuction”,“rateOnProperty”,“radiusLimit”].includes(k)
? parseFloat(v) || settings[k]
: v || settings[k];
}
});
setSettings(updated);
setSaved(true);
setTimeout(() => setSaved(false), 2000);
}

const filtered=filter===“All”?jobs:jobs.filter(j=>j.status===filter);
const cur = sel ? (() => {

if (!j) return null;
if (!j.conditionReport) return { …j, conditionReport:{ pre:{findings:[],photos:[],ts:null}, post:{findings:[],photos:[],ts:null}, newDamage:[] } };
return j;
})() : null;

function update(id,patch) {
setJobs(prev=>prev.map(j=>j.id===id?{…j,…patch,notifications:[…(j.notifications||[]),…(patch._note?[patch._note]:[])]}:j));
if(patch._note) delete patch._note;
}

function archiveJob(job) {
const archived = { …job, archivedAt: new Date().toLocaleDateString(), notifications:[…(job.notifications||[]),“Job archived”] };
setArchivedJobs(prev=>[archived,…prev]);
setJobs(prev=>prev.filter(j=>j.id!==job.id));
setSel(null);
}

const completed = jobs.filter(j=>j.status===“Completed”);

setArchivedJobs(prev=>[…completed.map(j=>({…j,archivedAt:ts,notifications:[…(j.notifications||[]),“Archived with batch clear”]})),…prev]);

function ClientLogin({ onLogin, clientsList=[] }) {
const [err,setErr]=useState(””);
const [loading,setLoading]=useState(false);
const emailRef = useRef();
const passRef  = useRef();

function login() {
const email = emailRef.current?.value?.trim() || “”;
const pass  = passRef.current?.value?.trim()  || “”;
setLoading(true); setErr(””);
setTimeout(() => {
// Check live clientsList first, then fall back to hardcoded CLIENT_ACCOUNTS
const fromList = clientsList.find(a => a.user === email && a.pass === pass);
const fromStatic = Object.entries(CLIENT_ACCOUNTS).find(([,v]) => v.user === email && v.pass === pass);
if (fromList) {
onLogin({ client: fromList.name, user: fromList.user, contact: fromList.contact });
} else if (fromStatic) {
onLogin({ client: fromStatic[0], …fromStatic[1] });
} else {
setErr(“Invalid email or password.”);
setLoading(false);
}
}, 600);
}

// All accounts for demo display
const allAccounts = [
…Object.entries(CLIENT_ACCOUNTS).map(([name,acc]) => ({ name, …acc })),
…clientsList.filter(a => !Object.values(CLIENT_ACCOUNTS).find(s => s.user === a.user)),
];

const iStyle = { width:“100%”, padding:“12px 16px”, borderRadius:12, boxSizing:“border-box”,
background:”#150828”, border:`1px solid ${C.darkGray}`, color:C.white, fontSize:14,
outline:“none”, fontFamily:“inherit” };

return (
<div style={{ minHeight:“100vh”, display:“flex”, alignItems:“center”, justifyContent:“center”, background:`radial-gradient(ellipse at 30% 30%,${C.midPurple}33 0%,transparent 60%),radial-gradient(ellipse at 70% 70%,${C.accent}11 0%,transparent 60%),${C.deepPurple}`, fontFamily:”‘DM Sans’,sans-serif” }}>

</div>
